<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Chain Game</title>

<style>

body{
background:#030b18;
color:#00eaff;
font-family:monospace;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
text-shadow:0 0 10px #00eaff;
}

input{
padding:10px;
width:200px;
background:#081424;
border:1px solid #00eaff;
color:white;
}

button{
padding:10px 20px;
margin-left:10px;
background:#00eaff;
border:none;
cursor:pointer;
}

#log{
margin-top:30px;
border:1px solid #00eaff;
padding:20px;
min-height:120px;
}

.valid{color:#00ff88}
.invalid{color:#ff5555}

</style>
</head>

<body>

<h1>WORD CHAIN</h1>

<p>Next word must start with: <b id="next">Any</b></p>

<input id="wordInput" placeholder="type word">
<button onclick="submitWord()">ENTER</button>

<div id="log"></div>

<script>

let lastLetter = ""
let usedWords = []

async function submitWord(){

let word = document.getElementById("wordInput").value.toLowerCase()

if(!word) return

if(usedWords.includes(word)){
log("Word already used","invalid")
return
}

if(lastLetter && !word.startsWith(lastLetter)){
log("Word must start with '"+lastLetter+"'","invalid")
return
}

let res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+word)

if(res.status!==200){
log("Invalid English word","invalid")
return
}

usedWords.push(word)

lastLetter = word[word.length-1]

document.getElementById("next").innerText = lastLetter.toUpperCase()

log(word,"valid")

document.getElementById("wordInput").value=""

}

function log(text,type){

let el=document.createElement("div")
el.className=type
el.innerText=text

document.getElementById("log").prepend(el)

}

</script>

</body>
</html>
