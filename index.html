<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>English Word Finder</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:700px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
width:200px;
margin-right:10px;
}

select{
padding:10px;
}

#results{
margin-top:20px;
max-height:400px;
overflow:auto;
background:#020617;
padding:15px;
border-radius:6px;
}

.word{
padding:4px 0;
border-bottom:1px solid #1e293b;
}

</style>
</head>

<body>

<div class="container">

<h1>English Word Finder</h1>

<input id="search" placeholder="type word prefix">

<select id="sort">
<option value="az">A-Z</option>
<option value="short">Short → Long</option>
<option value="long">Long → Short</option>
</select>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
